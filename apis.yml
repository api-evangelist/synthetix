name: Synthetix
description: 'Synthetix is a derivatives liquidity protocol built on Ethereum and
  EVM-compatible L2 networks (Optimism, Base). It provides perpetual futures trading
  with deep onchain liquidity, supporting a wide range of synthetic assets. The platform
  exposes REST and WebSocket APIs for querying collateral, managing positions, accessing
  funding rates, monitoring liquidations, tracking staking rewards, and interacting
  with V3 markets across Optimism and Base.

  '
